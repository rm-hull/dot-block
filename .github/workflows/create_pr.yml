name: Gemini Issue to PR

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: contains(github.event.issue.body, '@gemini-pr-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GEMINI_PR_AGENT_CLIENT_ID }}
          private-key: ${{ secrets.GEMINI_PR_AGENT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Run Gemini CLI Code Fix
        id: gemini_agent
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite
          prompt: |
            Fix the following issue by modifying or adding files in the workspace.
            Issue Title: ${{ github.event.issue.title }}
            Issue Body: ${{ github.event.issue.body }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: "fix: automated code generation from Gemini for #${{ github.event.issue.number }}"
          title: "fix: ${{ github.event.issue.title }}"
          body: |
            _This is an automated PR generated by Gemini in response to issue #${{ github.event.issue.number }}._

            ## Summary

            ${{ steps.gemini_agent.outputs.summary }}

            > [!CAUTION]
            > Please review the generated code carefully before merging!

            Closes #${{ github.event.issue.number }}
          branch: gemini/patch-issue-${{ github.event.issue.number }}
          branch-suffix: short-commit-hash
          base: main
          labels: go,ai-generated
          sign-commits: true
