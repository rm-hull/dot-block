name: Gemini PR Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  code-review:
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '/review') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Run pi agent for PR Review
        id: pi_agent
        uses: cv/pi-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: google
          model: gemma-4-31b-it
          api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            # Code Review for PR #{{number}}: {{title}}

            ## Description
            {{body}}

            ## Review Request
            {{task}}

            ## Changes
            ```diff
            {{diff}}
            ```

            ## Review Guidelines
            - Check for security vulnerabilities
            - Verify test coverage
            - Ensure code follows our style guide
            - Flag any performance concerns
            - Suggest improvements where applicable

            Please provide a thorough code review.
