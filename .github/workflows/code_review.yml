name: Gemini PR Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  code-review:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GEMINI_PR_AGENT_CLIENT_ID }}
          private-key: ${{ secrets.GEMINI_PR_AGENT_PRIVATE_KEY }}

      - name: Fetch PR Details
        id: pr_data
        run: |
          PR_JSON=$(curl -s -H "Authorization: token ${{ steps.generate_token.outputs.token }}" \
            "${{ github.event.issue.pull_request.url }}")
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          ref: ${{ steps.pr_data.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - uses: shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ steps.generate_token.outputs.token }}
          provider: google
          model: gemma-4-31b-it
          token: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Review this pull request. Before starting, use get_issue_or_pr_thread to
            fetch any existing review comments so you don't duplicate feedback that
            has already been given. Focus on issues, bugs, and security concerns.
            Post your findings as a PR review when done.
